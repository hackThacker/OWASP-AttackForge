name: hackthacker-labs

networks:
  hackthacker:
    driver: bridge
    name: hackthacker

volumes:
  mariadb-data:
    name: hackthacker-labs-mariadb-data
  postgresql-data:
    name: hackthacker-labs-crapi-postgresql-data
  mongodb-data:
    name: hackthacker-labs-crapi-mongodb-data
  chromadb-data:
    name: hackthacker-labs-crapi-chromadb-data
  restaurant-db-data:
    name: hackthacker-labs-restaurant-db-data

services:
  # ----------------------------------------------------------------------------
  # Database Layer (Shared by all PHP Apps)
  # ----------------------------------------------------------------------------
  db:
    image: mariadb:11.4
    container_name: hackthacker-labs-db
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      MARIADB_USER: ${DB_USER:-hackthacker}
      MARIADB_PASSWORD: ${DB_PASS:-hackthacker}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-hackthacker}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u\"$$MARIADB_USER\" -p\"$$MARIADB_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Nginx Router & Proxy (Attacker Frontdoor Interface)
  # ----------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    image: hackthacker-labs-nginx
    container_name: hackthacker-labs-nginx
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    networks:
      - hackthacker
    environment:
      - DOMAIN=${DOMAIN:-hackthacker.lab}
      - SSL_ORG=${SSL_ORG:-OWASP AttackForge}
    depends_on:
      mutillidae:
        condition: service_healthy
      dvwa:
        condition: service_healthy
      bwapp:
        condition: service_healthy
      xvwa:
        condition: service_healthy
      vwa:
        condition: service_healthy
      juiceshop:
        condition: service_healthy
      tomcat:
        condition: service_healthy
      webgoat:
        condition: service_healthy
      webwolf:
        condition: service_healthy
      wrongsecrets:
        condition: service_healthy
      securityshepherd:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:8443/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------------
  # PHP Vulnerable Applications Tier
  # ----------------------------------------------------------------------------
  mutillidae:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.php
      args:
        APP_SOURCE_URL: "https://github.com/webpwnized/mutillidae.git"
        APP_NAME: "mutillidae"
    image: hackthacker-labs-mutillidae
    container_name: hackthacker-labs-mutillidae
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - APP_NAME=mutillidae
      - APACHE_DOCROOT=/var/www/html/src
      - DB_USER=${DB_USER:-hackthacker}
      - DB_PASS=${DB_PASS:-hackthacker}
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/index.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  dvwa:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.php
      args:
        APP_SOURCE_URL: "https://github.com/digininja/DVWA.git"
        APP_NAME: "dvwa"
    image: hackthacker-labs-dvwa
    container_name: hackthacker-labs-dvwa
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - APP_NAME=dvwa
      - DB_USER=${DB_USER:-hackthacker}
      - DB_PASS=${DB_PASS:-hackthacker}
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/setup.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  bwapp:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.php
      args:
        APP_SOURCE_URL: "https://github.com/iMoon07/bWAPPs.git"
        APP_NAME: "bwapp"
    image: hackthacker-labs-bwapp
    container_name: hackthacker-labs-bwapp
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - APP_NAME=bwapp
      - APACHE_DOCROOT=/var/www/html/bWAPP
      - DB_USER=${DB_USER:-hackthacker}
      - DB_PASS=${DB_PASS:-hackthacker}
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/install.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  xvwa:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.php
      args:
        APP_SOURCE_URL: "https://github.com/s4n7h0/xvwa.git"
        APP_NAME: "xvwa"
    image: hackthacker-labs-xvwa
    container_name: hackthacker-labs-xvwa
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - APP_NAME=xvwa
      - DB_USER=${DB_USER:-hackthacker}
      - DB_PASS=${DB_PASS:-hackthacker}
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/index.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  vwa:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.php
      args:
        APP_SOURCE_URL: "https://github.com/hummingbirdscyber/Vulnerable-Web-Application.git"
        APP_NAME: "vwa"
    image: hackthacker-labs-vwa
    container_name: hackthacker-labs-vwa
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - APP_NAME=vwa
      - DB_USER=${DB_USER:-hackthacker}
      - DB_PASS=${DB_PASS:-hackthacker}
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/index.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------------
  # Node.js Application Tier (Juice Shop)
  # ----------------------------------------------------------------------------
  juiceshop:
    build:
      context: ./docker/juiceshop
      dockerfile: Dockerfile
    image: hackthacker-labs-juiceshop
    container_name: hackthacker-labs-juiceshop
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - NODE_OPTIONS=--max-old-space-size=160
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ----------------------------------------------------------------------------
  # Java Application Tier (WebGoat & WebWolf)
  # ----------------------------------------------------------------------------
  webgoat:
    build:
      context: ./docker/webgoat
      dockerfile: Dockerfile
    image: hackthacker-labs-webgoat
    container_name: hackthacker-labs-webgoat
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - WEBWOLF_HOST=hackthacker-labs-webwolf
      - WEBWOLF_PORT=9090
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Xmx512m
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  webwolf:
    build:
      context: ./docker/webwolf
      dockerfile: Dockerfile
    image: hackthacker-labs-webwolf
    container_name: hackthacker-labs-webwolf
    restart: unless-stopped
    networks:
      - hackthacker
    depends_on:
      webgoat:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:hsqldb:hsql://hackthacker-labs-webgoat:9001/webgoat
      - WEBGOAT_HOST=hackthacker-labs-webgoat
      - WEBGOAT_PORT=8080
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Xmx256m
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ----------------------------------------------------------------------------
  # Tomcat Container
  # ----------------------------------------------------------------------------
  tomcat:
    build:
      context: ./docker/tomcat
      dockerfile: Dockerfile
    image: hackthacker-labs-tomcat
    container_name: hackthacker-labs-tomcat
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - TOMCAT_USER=${TOMCAT_USER:-${DB_USER:-hackthacker}}
      - TOMCAT_PASS=${TOMCAT_PASS:-${DB_PASS:-hackthacker}}
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Xmx256m
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------------------------
  # Initializer Service (Runs migrations and exits)
  # ----------------------------------------------------------------------------
  initializer:
    build:
      context: ./docker/initializer
      dockerfile: Dockerfile
    image: hackthacker-labs-initializer
    container_name: hackthacker-labs-initializer
    networks:
      - hackthacker
    volumes:
      - ./docker/initializer/init.sh:/usr/local/bin/init.sh:ro
    depends_on:
      mutillidae:
        condition: service_healthy
      dvwa:
        condition: service_healthy
      bwapp:
        condition: service_healthy
      xvwa:
        condition: service_healthy
      vwa:
        condition: service_healthy
    init: true

  # ----------------------------------------------------------------------------
  # OWASP WrongSecrets Application Tier
  # ----------------------------------------------------------------------------
  wrongsecrets:
    build:
      context: ./docker/wrongsecrets
      dockerfile: Dockerfile
    image: hackthacker-labs-wrongsecrets
    container_name: hackthacker-labs-wrongsecrets
    restart: unless-stopped
    ports:
      - "8090:8090"
    networks:
      - hackthacker
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------------
  # OWASP Security Shepherd Services Tier
  # ----------------------------------------------------------------------------
  securityshepherd-db:
    build:
      context: ./docker/securityshepherd
      dockerfile: Dockerfile.db
    image: hackthacker-labs-securityshepherd-db
    container_name: hackthacker-labs-securityshepherd-db
    restart: unless-stopped
    networks:
      - hackthacker
    environment:
      - MARIADB_ROOT_PASSWORD=hackthacker
      - MARIADB_DATABASE=core
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -phackthacker"]
      interval: 10s
      timeout: 5s
      retries: 5

  securityshepherd-mongo:
    build:
      context: ./docker/securityshepherd
      dockerfile: Dockerfile.mongo
    image: hackthacker-labs-securityshepherd-mongo
    container_name: hackthacker-labs-securityshepherd-mongo
    restart: unless-stopped
    networks:
      - hackthacker
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mongo --eval 'db.runCommand({connectionStatus: 1})' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  securityshepherd:
    build:
      context: ./docker/securityshepherd
      dockerfile: Dockerfile.web
    image: hackthacker-labs-securityshepherd
    container_name: hackthacker-labs-securityshepherd
    restart: unless-stopped
    networks:
      - hackthacker
    depends_on:
      securityshepherd-db:
        condition: service_healthy
      securityshepherd-mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ----------------------------------------------------------------------------
  # SasanLabs VulnerableApp Farm
  # ----------------------------------------------------------------------------
  vulnerableapp-base:
    image: sasanlabs/owasp-vulnerableapp:latest
    container_name: hackthacker-labs-vulnerableapp-base
    restart: unless-stopped
    networks:
      hackthacker:
        aliases:
          - VulnerableApp-base
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  vulnerableapp-jsp:
    image: sasanlabs/owasp-vulnerableapp-jsp:latest
    container_name: hackthacker-labs-vulnerableapp-jsp
    restart: unless-stopped
    networks:
      hackthacker:
        aliases:
          - VulnerableApp-jsp
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  vulnerableapp-php:
    image: sasanlabs/owasp-vulnerableapp-php:latest
    container_name: hackthacker-labs-vulnerableapp-php
    restart: unless-stopped
    networks:
      hackthacker:
        aliases:
          - VulnerableApp-php
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  vulnerableapp-facade:
    image: sasanlabs/owasp-vulnerableapp-facade:latest
    container_name: hackthacker-labs-vulnerableapp-facade
    restart: unless-stopped
    networks:
      hackthacker:
        aliases:
          - VulnerableApp-facade
    depends_on:
      - vulnerableapp-base
      - vulnerableapp-jsp
      - vulnerableapp-php
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------------
  # OWASP crAPI Tier
  # ----------------------------------------------------------------------------
  crapi-postgresdb:
    container_name: hackthacker-labs-crapi-postgresdb
    image: postgres:14-alpine
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: crapisecretpassword
      POSTGRES_DB: crapi
    networks:
      hackthacker:
        aliases:
          - postgresdb
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d crapi" ]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  crapi-mongodb:
    container_name: hackthacker-labs-crapi-mongodb
    image: mongo:4.4
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: crapisecretpassword
    networks:
      hackthacker:
        aliases:
          - mongodb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo mongodb:27017/test --quiet
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  crapi-chromadb:
    container_name: hackthacker-labs-crapi-chromadb
    image: chromadb/chroma:latest
    environment:
      IS_PERSISTENT: 'TRUE'
    networks:
      hackthacker:
        aliases:
          - chromadb
    healthcheck:
      test: [ "CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  crapi-mailhog:
    user: root
    container_name: hackthacker-labs-crapi-mailhog
    image: crapi/mailhog:latest
    environment:
      MH_MONGO_URI: admin:crapisecretpassword@mongodb:27017
      MH_STORAGE: mongodb
    networks:
      hackthacker:
        aliases:
          - mailhog
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "8025" ]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  crapi-gateway:
    container_name: hackthacker-labs-crapi-gateway
    image: crapi/gateway-service:latest
    networks:
      hackthacker:
        aliases:
          - api.mypremiumdealership.com
    healthcheck:
      test: bash -c 'echo -n "GET / HTTP/1.1\n\n" > /dev/tcp/127.0.0.1/443'
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 50M

  crapi-identity:
    container_name: hackthacker-labs-crapi-identity
    image: crapi/crapi-identity:latest
    networks:
      - hackthacker
    environment:
      - LOG_LEVEL=INFO
      - DB_NAME=crapi
      - DB_USER=admin
      - DB_PASSWORD=crapisecretpassword
      - DB_HOST=postgresdb
      - DB_PORT=5432
      - SERVER_PORT=8080
      - ENABLE_SHELL_INJECTION=false
      - JWT_SECRET=crapi
      - MAILHOG_HOST=mailhog
      - MAILHOG_PORT=1025
      - MAILHOG_DOMAIN=example.com
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - SMTP_EMAIL=user@example.com
      - SMTP_PASS=xxxxxxxxxxxxxx
      - SMTP_FROM=no-reply@example.com
      - SMTP_AUTH=true
      - SMTP_STARTTLS=true
      - JWT_EXPIRATION=604800000
      - ENABLE_LOG4J=false
      - API_GATEWAY_URL=https://api.mypremiumdealership.com
      - TLS_ENABLED=false
      - TLS_KEYSTORE_TYPE=PKCS12
      - TLS_KEYSTORE=classpath:certs/server.p12
      - TLS_KEYSTORE_PASSWORD=passw0rd
      - TLS_KEY_PASSWORD=passw0rd
      - TLS_KEY_ALIAS=identity
    depends_on:
      crapi-postgresdb:
        condition: service_healthy
      crapi-mongodb:
        condition: service_healthy
      crapi-mailhog:
        condition: service_healthy
    healthcheck:
      test: /app/health.sh
      interval: 15s
      timeout: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  crapi-community:
    container_name: hackthacker-labs-crapi-community
    image: crapi/crapi-community:latest
    networks:
      - hackthacker
    environment:
      - LOG_LEVEL=INFO
      - IDENTITY_SERVICE=crapi-identity:8080
      - DB_NAME=crapi
      - DB_USER=admin
      - DB_PASSWORD=crapisecretpassword
      - DB_HOST=postgresdb
      - DB_PORT=5432
      - SERVER_PORT=8087
      - MONGO_DB_HOST=mongodb
      - MONGO_DB_PORT=27017
      - MONGO_DB_USER=admin
      - MONGO_DB_PASSWORD=crapisecretpassword
      - MONGO_DB_NAME=crapi
      - TLS_ENABLED=false
      - TLS_CERTIFICATE=certs/server.crt
      - TLS_KEY=certs/server.key
    depends_on:
      crapi-postgresdb:
        condition: service_healthy
      crapi-mongodb:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
    healthcheck:
      test: /app/health.sh
      interval: 15s
      timeout: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  crapi-workshop:
    container_name: hackthacker-labs-crapi-workshop
    image: crapi/crapi-workshop:latest
    networks:
      - hackthacker
    environment:
      - LOG_LEVEL=INFO
      - IDENTITY_SERVICE=crapi-identity:8080
      - DB_NAME=crapi
      - DB_USER=admin
      - DB_PASSWORD=crapisecretpassword
      - DB_HOST=postgresdb
      - DB_PORT=5432
      - SERVER_PORT=8000
      - MONGO_DB_HOST=mongodb
      - MONGO_DB_PORT=27017
      - MONGO_DB_USER=admin
      - MONGO_DB_PASSWORD=crapisecretpassword
      - MONGO_DB_NAME=crapi
      - SECRET_KEY=crapi
      - API_GATEWAY_URL=https://api.mypremiumdealership.com
      - TLS_ENABLED=false
      - TLS_CERTIFICATE=certs/server.crt
      - TLS_KEY=certs/server.key
      - FILES_LIMIT=1000
    depends_on:
      crapi-postgresdb:
        condition: service_healthy
      crapi-mongodb:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
      crapi-community:
        condition: service_healthy
    healthcheck:
      test: /app/health.sh
      interval: 15s
      timeout: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  crapi-chatbot:
    container_name: hackthacker-labs-crapi-chatbot
    image: crapi/crapi-chatbot:latest
    networks:
      - hackthacker
    environment:
      - TLS_ENABLED=false
      - SERVER_PORT=5002
      - WEB_SERVICE=crapi-web
      - IDENTITY_SERVICE=crapi-identity:8080
      - DB_NAME=crapi
      - DB_USER=admin
      - DB_PASSWORD=crapisecretpassword
      - DB_HOST=postgresdb
      - DB_PORT=5432
      - MONGO_DB_HOST=mongodb
      - MONGO_DB_PORT=27017
