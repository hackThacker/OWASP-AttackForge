name: Supply Chain Security Attestation

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        default: 'latest'

jobs:
  attest:
    name: Sign & Attest (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for keyless OIDC signing
      contents: write
      packages: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - attackforge
          - nginx
          - mutillidae
          - dvwa
          - bwapp
          - xvwa
          - vwa
          - juiceshop
          - webgoat
          - webwolf
          - tomcat
          - initializer
          - wrongsecrets
          - securityshepherd-db
          - securityshepherd-mongo
          - securityshepherd
          - brokencrystals-db
          - brokencrystals-keycloak
          - brokencrystals-app
          - dvws-node
          - zerohealth-server
          - zerohealth-client
          - restaurant-app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse Version
        id: parse_version
        run: |
          VERSION="${{ inputs.version || github.event.release.tag_name || 'latest' }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set Image Name
        id: set_image
        run: |
          GHCR_ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ matrix.service }}" = "attackforge" ]; then
            echo "fullname=ghcr.io/${GHCR_ORG}/attackforge:${{ steps.parse_version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "subject=ghcr.io/${GHCR_ORG}/attackforge" >> $GITHUB_OUTPUT
          else
            echo "fullname=ghcr.io/${GHCR_ORG}/attackforge-${{ matrix.service }}:${{ steps.parse_version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "subject=ghcr.io/${GHCR_ORG}/attackforge-${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ steps.set_image.outputs.fullname }}
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.service }}.json

      - name: Sign GHCR Image with Cosign
        run: |
          cosign sign --yes ${{ steps.set_image.outputs.fullname }}

      - name: Attest SBOM (SLSA Attestation)
        uses: actions/attest@v1
        with:
          subject-name: ${{ steps.set_image.outputs.subject }}
          subject-digest: ${{ steps.parse_version.outputs.version }} # Or tag reference
          predicate-type: 'https://cyclonedx.org/bom'
          predicate-path: 'sbom-${{ matrix.service }}.json'
