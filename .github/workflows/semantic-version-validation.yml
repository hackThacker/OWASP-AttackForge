name: Semantic Version Validation

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  validate-version:
    name: Enforce SemVer Regex
    runs-on: ubuntu-latest
    steps:
      - name: Validate Tag Format
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "Triggering tag: $TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not follow semantic versioning format '^v[0-9]+\.[0-9]+\.[0-9]+$' (e.g. v1.0.0, v2.3.15)."
            exit 1
          fi
          echo "Tag '$TAG' is a valid Semantic Version."
