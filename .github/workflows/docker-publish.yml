name: Publish Docker Images

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        default: 'latest'
  release:
    types: [published]

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: nginx
            context: ./docker/nginx
            dockerfile: Dockerfile
            image_name: nginx
          - name: mutillidae
            context: ./docker/php
            dockerfile: Dockerfile.php
            image_name: mutillidae
            build_args: |
              APP_SOURCE_URL=https://github.com/webpwnized/mutillidae.git
              APP_NAME=mutillidae
          - name: dvwa
            context: ./docker/php
            dockerfile: Dockerfile.php
            image_name: dvwa
            build_args: |
              APP_SOURCE_URL=https://github.com/digininja/DVWA.git
              APP_NAME=dvwa
          - name: bwapp
            context: ./docker/php
            dockerfile: Dockerfile.php
            image_name: bwapp
            build_args: |
              APP_SOURCE_URL=https://github.com/iMoon07/bWAPPs.git
              APP_NAME=bwapp
          - name: xvwa
            context: ./docker/php
            dockerfile: Dockerfile.php
            image_name: xvwa
            build_args: |
              APP_SOURCE_URL=https://github.com/s4n7h0/xvwa.git
              APP_NAME=xvwa
          - name: vwa
            context: ./docker/php
            dockerfile: Dockerfile.php
            image_name: vwa
            build_args: |
              APP_SOURCE_URL=https://github.com/hummingbirdscyber/Vulnerable-Web-Application.git
              APP_NAME=vwa
          - name: juiceshop
            context: ./docker/juiceshop
            dockerfile: Dockerfile
            image_name: juiceshop
          - name: webgoat
            context: ./docker/webgoat
            dockerfile: Dockerfile
            image_name: webgoat
          - name: webwolf
            context: ./docker/webwolf
            dockerfile: Dockerfile
            image_name: webwolf
          - name: tomcat
            context: ./docker/tomcat
            dockerfile: Dockerfile
            image_name: tomcat
          - name: initializer
            context: ./docker/initializer
            dockerfile: Dockerfile
            image_name: initializer
          - name: wrongsecrets
            context: ./docker/wrongsecrets
            dockerfile: Dockerfile
            image_name: wrongsecrets
          - name: securityshepherd-db
            context: ./docker/securityshepherd
            dockerfile: Dockerfile.db
            image_name: securityshepherd-db
          - name: securityshepherd-mongo
            context: ./docker/securityshepherd
            dockerfile: Dockerfile.mongo
            image_name: securityshepherd-mongo
          - name: securityshepherd
            context: ./docker/securityshepherd
            dockerfile: Dockerfile.web
            image_name: securityshepherd

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse Version
        id: parse_version
        run: |
          VERSION="${{ inputs.version || github.event.release.tag_name || 'latest' }}"
          # Clean version formatting
          VERSION_NO_V="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION_NO_V}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          build-args: ${{ matrix.service.build_args }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hackthacker-labs-${{ matrix.service.image_name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hackthacker-labs-${{ matrix.service.image_name }}:${{ steps.parse_version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hackthacker-labs-${{ matrix.service.image_name }}:${{ steps.parse_version.outputs.version_no_v }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
