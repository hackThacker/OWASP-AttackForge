name: Release Promotion Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  validate-tag:
    name: Enforce SemVer
    uses: ./.github/workflows/semantic-version-validation.yml
    with:
      tag: ${{ github.ref_name }}

  quality-gate:
    name: Execute Quality Gates
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Compose File Syntax
        run: |
          docker compose config -q

      - name: Validate Dev Compose File Syntax
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config -q

      - name: Check Shell Scripts Syntax
        run: |
          find . -name "*.sh" -exec bash -n {} +

  staging:
    name: Promote to Staging
    needs: quality-gate
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://staging.owasp.hacking
    steps:
      - name: Deploy Staging Application Mock
        run: |
          echo "Simulating automated deployment to Staging environment..."
          echo "Executing integration smoke tests..."
          echo "Smoke tests completed successfully!"

  production:
    name: Promote to Production Release
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://production.owasp.hacking
    outputs:
      release_title: ${{ steps.notes.outputs.release_title }}
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git log to access commit history

      - name: Generate Dynamic Release Notes
        id: notes
        run: |
          python .github/scripts/generate-release-notes.py

      - name: Create Draft GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.notes.outputs.release_title }}
          body_path: RELEASE_NOTES_DRAFT.md
          draft: true
          prerelease: false

      - name: Upload Release Notes Draft
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-draft
          path: RELEASE_NOTES_DRAFT.md

  publish-production-images:
    name: Publish Production Images
    needs: production
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  attest-images:
    name: Attest & Sign Images
    needs: publish-production-images
    uses: ./.github/workflows/supply-chain-attest.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  verify-release:
    name: Verify & Finalize Release
    needs: [production, publish-production-images, attest-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (Conditional)
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          fi

      - name: Download Release Notes Draft
        uses: actions/download-artifact@v4
        with:
          name: release-notes-draft

      - name: Validate Release Registries & Finalize Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GHCR_ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          DOCKER_ORG="${{ secrets.DOCKERHUB_USERNAME }}"
          TAG="${{ github.ref_name }}"
          
          echo "Verifying draft release exists on GitHub..."
          gh release view "${TAG}" --json isDraft
          
          echo "Verifying package exists on GHCR..."
          docker buildx imagetools inspect "ghcr.io/${GHCR_ORG}/attackforge:${TAG}"
          
          # Extract digest from registry
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/${GHCR_ORG}/attackforge:${TAG}" | grep -m1 "Digest:" | awk '{print $2}')
          echo "Extracted Image Digest: ${DIGEST}"
          
          DOCKERHUB_STATUS=""
          DOCKERHUB_PULL_CMD="docker pull ghcr.io/${GHCR_ORG}/attackforge:${TAG} # (Docker Hub not configured)"
          if [ -n "${DOCKER_ORG}" ]; then
            echo "Verifying package exists on Docker Hub..."
            docker buildx imagetools inspect "docker.io/${DOCKER_ORG}/attackforge:${TAG}"
            DOCKERHUB_STATUS="✓ Docker Hub Published"
            DOCKERHUB_PULL_CMD="docker pull ${DOCKER_ORG}/attackforge:${TAG}"
          fi
          
          echo "Appending registry status and digest checksums to release notes..."
          cat <<EOF >> RELEASE_NOTES_DRAFT.md

          ## Packages

          Docker Hub:
          \`\`\`bash
          ${DOCKERHUB_PULL_CMD}
          \`\`\`

          GHCR:
          \`\`\`bash
          docker pull ghcr.io/${GHCR_ORG}/attackforge:${TAG}
          \`\`\`

          ## Checksums

          Image Digest:
          \`${DIGEST}\`

          ## Registry Status

          ${DOCKERHUB_STATUS:+"${DOCKERHUB_STATUS}"}
          ✓ GitHub Container Registry Published
          EOF
          
          echo "Finalizing and publishing release..."
          gh release edit "${TAG}" --title "${{ needs.production.outputs.release_title }}" --notes-file RELEASE_NOTES_DRAFT.md --draft=false
