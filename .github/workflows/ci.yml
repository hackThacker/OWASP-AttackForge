name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-compose:
    name: Validate Docker Compose Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Validate Compose File Syntax
        run: |
          docker compose config -q

      - name: Validate Dev Compose File Syntax
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config -q

  lint-dockerfiles:
    name: Lint Dockerfile (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - "docker/nginx/Dockerfile"
          - "docker/php/Dockerfile.php"
          - "docker/juiceshop/Dockerfile"
          - "docker/webgoat/Dockerfile"
          - "docker/webwolf/Dockerfile"
          - "docker/tomcat/Dockerfile"
          - "docker/initializer/Dockerfile"
          - "docker/wrongsecrets/Dockerfile"
          - "docker/securityshepherd/Dockerfile.db"
          - "docker/securityshepherd/Dockerfile.mongo"
          - "docker/securityshepherd/Dockerfile.web"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: error

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
