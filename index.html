        .brand-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;

            height: 100%;

            content: '';

            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 36px;

        /* Enhanced Tool Cards with Animations */
        .tool-card {
            background: linear-gradient(145deg, #1a2332, #0f1419);

        .tool-card::before {
            content: '';

        .status-indicator {
            width: 12px;

            border-radius: 50%;
            display: inline-block;

            position: relative;
            animation: statusPulse 2s infinite;

        .status-indicator.status-running {

        @keyframes statusPulse {

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

                protocols: ["https"],
                port: "8443",
                uri: "/",

                credentials: { username: "admin", password: "admin" }
            },
            {
                name: "DVWS Node",
                subdomain: "dvws",
                icon: "fas fa-network-wired",
                description: "Damn Vulnerable Web Services is a vulnerable web services application for learning API and web service security.",
                protocols: ["https"],
                port: "8443",
                uri: "/",
                category: "API Security",
                credentials: { username: "admin", password: "admin" }
            },
            {
                name: "Zero Health",
                subdomain: "zerohealth",
                icon: "fas fa-heartbeat",
                description: "A vulnerable medical application stack with a separate client frontend and a server backend API.",
                protocols: ["https"],
                port: "8443",
                uri: "/",
                category: "Web Application",
                credentials: { username: "admin", password: "admin" }
            },
            {
                name: "Damn Vulnerable RESTaurant",
                subdomain: "restaurant",
                icon: "fas fa-utensils",
                description: "A REST API game designed to teach developers and security practitioners how to secure REST APIs.",
                protocols: ["https"],
                port: "8443",
                uri: "/",
                category: "API Security",
                credentials: { username: "admin", password: "admin" }

        ];

        let allTools = [...staticTools];
        let serverIP = null;
        let selectedTools = new Set();

        // Server IP detection
        function getServerIP() {
            const overrideIP = localStorage.getItem('cyberblue_override_ip');
            if (overrideIP && overrideIP.trim() !== '') {
                return overrideIP.trim();
            }
            return serverIP || window.location.hostname;
        }

        function promptForIPOverride() {
            const currentIP = getServerIP();
            const newIP = prompt(
                `Current IP: ${currentIP}\n\nEnter new IP address for tool access:\n(Leave empty to use auto-detected IP)`,
                currentIP
            );

            if (newIP !== null) {
                if (newIP.trim() === '') {
                    localStorage.removeItem('cyberblue_override_ip');
                    showNotification('Using auto-detected IP address', 'info');
                    updateIPDisplay();
                    renderTools(allTools);
                } else {
                    const ipPattern = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|^[a-zA-Z0-9.-]+$/;
                    if (ipPattern.test(newIP.trim())) {
                        localStorage.setItem('cyberblue_override_ip', newIP.trim());
                        showNotification(`IP override set to: ${newIP.trim()}`, 'success');
                        updateIPDisplay();
                        renderTools(allTools);
                    } else {
                        showNotification('Invalid IP address format', 'error');
                    }
                }
            }
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `alert alert-${type === 'error' ? 'danger' : type === 'success' ? 'success' : 'info'} alert-dismissible fade show position-fixed`;
            notification.style.cssText = 'top: 20px; right: 20px; z-index: 9999; max-width: 400px;';
            notification.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(notification);
            setTimeout(() => { if (notification.parentNode) notification.remove(); }, 5000);
        }

        // Update IP display button
        function updateIPDisplay() {
            const currentIP = getServerIP();
            const overrideIP = localStorage.getItem('cyberblue_override_ip');
            const displayElement = document.getElementById('current-ip-display');
            if (displayElement) {
                displayElement.innerHTML = `IP: ${currentIP}`;
                displayElement.parentElement.title = overrideIP 
                    ? `Using override IP: ${currentIP} (Click to change)` 
                    : `Using auto-detected IP: ${currentIP} (Click to override)`;
            }
        }

        // Render Tools list
        function renderTools(tools) {
            const container = document.getElementById('toolsList');
            container.innerHTML = '';

            tools.forEach(tool => {
                const category = tool.category;
                const categoryColor = getCategoryColor(category);

                const currentIP = getServerIP();
                const portSuffix = window.location.port ? `:${window.location.port}` : '';
                const hrefUrl = `https://${tool.subdomain}.${currentIP}${portSuffix}${tool.uri}`;

                const toolCard = document.createElement('div');
                toolCard.className = `tool-card status-running`;
                toolCard.style.borderLeftColor = categoryColor;

                toolCard.innerHTML = `
                    <div class="tool-header">
                        <div class="d-flex align-items-center justify-content-between">
                            <h6>
                                <i class="${tool.icon} me-2 tool-icon"></i>${tool.name}
                                <span class="category-badge" style="background-color: ${categoryColor}20; color: ${categoryColor}; border: 1px solid ${categoryColor}40;">
                                    ${category.replace('-', ' ').toUpperCase()}
                                </span>
                            </h6>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input tool-checkbox" 
                                       onchange="handleToolSelection(this, '${tool.name}')"
                                       data-tool-name="${tool.name}">
                            </div>
                        </div>
                        <div class="tool-description">${tool.description}</div>
                        <div class="tool-status">
                            <span class="status-indicator status-running"></span>
                            <span class="small">Running</span>
                            <span class="performance-indicator">🟢 Optimal</span>
                        </div>
                    </div>
                    <div class="tool-actions">
                        <div class="button-row">
                            <a href="${hrefUrl}" target="_blank" 
                               class="btn btn-outline-primary btn-sm w-100">
                                <i class="fas fa-external-link-alt me-1"></i>Open Lab
                            </a>
                            <button class="btn btn-outline-info btn-sm" onclick="showCredentials('${tool.name}')">
                                <i class="fas fa-key me-1"></i>Credentials
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="showToolInfo('${tool.name}')">
                                <i class="fas fa-info-circle me-1"></i>Info
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(toolCard);
            });

            // Update UI count
            document.getElementById('selectedCount').textContent = `${selectedTools.size} labs selected`;
            document.getElementById('selectAllTools').checked = selectedTools.size === allTools.length && allTools.length > 0;
        }

        function getCategoryColor(category) {
            switch (category.toLowerCase()) {
                case 'web application': return '#3b82f6';
                case 'java application': return '#f59e0b';
                case 'api security': return '#10b981';
                case 'cloud security': return '#8b5cf6';
                case 'infrastructure': return '#6366f1';
                default: return '#6b7280';
            }
        }

        // Selection Handlers
        function handleToolSelection(checkbox, toolName) {
            if (checkbox.checked) {
                selectedTools.add(toolName);
            } else {
                selectedTools.delete(toolName);
            }
            document.getElementById('selectedCount').textContent = `${selectedTools.size} labs selected`;
            
            // Enable/disable action buttons
            const hasSelection = selectedTools.size > 0;
            document.getElementById('bulkStartBtn').disabled = !hasSelection;
            document.getElementById('bulkRestartBtn').disabled = !hasSelection;
            document.getElementById('bulkStopBtn').disabled = !hasSelection;
        }

        // Credentials Modal
        function showCredentials(toolName) {
            const tool = allTools.find(t => t.name === toolName);
            if (!tool) return;

            let credentialsHTML = `
                <div class="credentials-field">
                    <label>Username:</label>
                    <span>${tool.credentials.username}</span>
                    \${tool.credentials.username !== 'None' ? `<button class="copy-btn" onclick="copyToClipboard('\${tool.credentials.username}')">Copy</button>` : ''}
                </div>
                <div class="credentials-field">
                    <label>Password:</label>
                    <span>${tool.credentials.password}</span>
                    \${tool.credentials.password !== 'N/A' ? `<button class="copy-btn" onclick="copyToClipboard('\${tool.credentials.password}')">Copy</button>` : ''}
                </div>`;

            document.getElementById('credentialsContent').innerHTML = credentialsHTML;
            document.getElementById('credentialsToolName').textContent = `\${tool.name} Credentials`;
            document.getElementById('credentialsModal').style.display = 'flex';
        }

        function closeCredentialsModal() {
            document.getElementById('credentialsModal').style.display = 'none';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('Copied to clipboard!', 'success');
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        }

        // Tool Info Modal
        function showToolInfo(toolName) {
            const tool = allTools.find(t => t.name === toolName);
            if (!tool) return;

            const currentIP = getServerIP();
            const portSuffix = window.location.port ? `:\${window.location.port}` : '';
            const hrefUrl = `https://\${tool.subdomain}.\${currentIP}\${portSuffix}\${tool.uri}`;

            const infoHTML = `
                <div class="tool-info-section">
                    <h5><i class="fas fa-info-circle me-2"></i>Overview</h5>
                    <p><strong>Description:</strong> \${tool.description}</p>
                    <p><strong>Category:</strong> \${tool.category}</p>
                    <p><strong>URL:</strong> <code>\${hrefUrl}</code></p>
                </div>
                <div class="tool-info-section">
                    <h5><i class="fas fa-server me-2"></i>Container Status</h5>
                    <p><strong>Status:</strong> <span class="badge bg-success">running</span></p>
                    <p><strong>Uptime:</strong> Up 100%</p>
                    <p><strong>Container Name:</strong> <code>hackthacker-labs-\${tool.subdomain}</code></p>
                </div>`;

            document.getElementById('toolInfoName').textContent = `\${tool.name} Details`;
            document.getElementById('toolInfoBody').innerHTML = infoHTML;
            document.getElementById('toolInfoModal').style.display = 'flex';
        }

        function closeToolInfoModal() {
            document.getElementById('toolInfoModal').style.display = 'none';
        }

        // Dashboard Metrics & Mini Dashboard
        function updateMiniDashboard() {
            document.getElementById('miniContainers').textContent = `\${allTools.length} / \${allTools.length}`;
            document.getElementById('miniHealth').textContent = "100%";
            
            // Randomize slightly to feel alive
            const cpu = Math.floor(Math.random() * 5) + 10;
            const mem = (Math.random() * 0.4 + 4.2).toFixed(1);
            document.getElementById('miniCpu').textContent = `\${cpu}%`;
            document.getElementById('miniMemory').textContent = `\${mem} GB`;
        }

        // Smart Suggestions
        const suggestions = [
            "Start with OWASP Juice Shop to learn about modern XSS and SQLi vulnerabilities.",
            "Use crAPI to understand microservice authentication and broken object-level authorization (BOLA).",
            "Mutillidae and DVWA are perfect targets for practicing traditional PHP web application bugs.",
            "Try WrongSecrets to learn why hardcoded credentials are a critical security issue.",
            "BrokenCrystals integrates with LLMs and Vector databases to teach modern AI vulnerabilities."
        ];

        function populateSuggestions() {
            const container = document.getElementById('suggestionsContainer');
            if (container) {
                container.innerHTML = '';
                const shuffled = suggestions.sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 3);
                selected.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.style.cssText = 'background: rgba(255,255,255,0.05); padding: 0.5rem; margin-bottom: 0.5rem; border-radius: 4px; font-size: 0.85rem; color: #cbd5e1; border-left: 3px solid #3b82f6;';
                    div.textContent = s;
                    container.appendChild(div);
                });
            }
        }

        // Search & Filtering
        function setupFilters() {
            const searchInput = document.getElementById('toolSearch');
            const categoryFilter = document.getElementById('categoryFilter');
            const statusFilter = document.getElementById('statusFilter');

            function applyFilters() {
                const query = searchInput.value.toLowerCase();
                const category = categoryFilter.value;
                const status = statusFilter.value;

                const filtered = allTools.filter(tool => {
                    const matchesSearch = tool.name.toLowerCase().includes(query) || tool.description.toLowerCase().includes(query);
                    const matchesCategory = category === 'all' || tool.category === category;
                    const matchesStatus = status === 'all' || status === 'running';

                    return matchesSearch && matchesCategory && matchesStatus;
                });

                renderTools(filtered);
                
                const noResults = document.getElementById('noResultsMessage');
                if (filtered.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    noResults.style.display = 'none';
                }
            }

            searchInput.addEventListener('input', applyFilters);
            categoryFilter.addEventListener('change', applyFilters);
            statusFilter.addEventListener('change', applyFilters);

            const categories = [...new Set(allTools.map(t => t.category))];
            categoryFilter.innerHTML = '<option value="all">All Categories</option>';
            categories.forEach(cat => {
                categoryFilter.innerHTML += `<option value="\${cat}">\${cat}</option>`;
            });
        }

        // Select All Handler
        document.getElementById('selectAllTools').addEventListener('change', function(e) {
            const checkboxes = document.querySelectorAll('.tool-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                handleToolSelection(cb, cb.dataset.toolName);
            });
        });

        // Bulk Actions
        document.getElementById('bulkStartBtn').addEventListener('click', () => {
            showNotification(`Starting \${selectedTools.size} selected labs...`, 'info');
            setTimeout(() => showNotification('All selected labs started!', 'success'), 1500);
        });
        document.getElementById('bulkRestartBtn').addEventListener('click', () => {
            showNotification(`Restarting \${selectedTools.size} selected labs...`, 'info');
            setTimeout(() => showNotification('All selected labs restarted!', 'success'), 1500);
        });
        document.getElementById('bulkStopBtn').addEventListener('click', () => {
            showNotification(`Stopping \${selectedTools.size} selected labs...`, 'info');
            setTimeout(() => showNotification('All selected labs stopped!', 'success'), 1500);
        });

        // Initialize on load
        window.addEventListener('load', async () => {
            updateIPDisplay();
            setupFilters();
            renderTools(allTools);
            updateMiniDashboard();
            populateSuggestions();
            setInterval(updateMiniDashboard, 5000);
        });
        </script>
